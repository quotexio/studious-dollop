app = "studious-dollop"
primary_region = "dfw" # আপনার রিজিয়ন অনুযায়ী

[build]
  # আপনার বিল্ড সেটিংস

# নিচের এই অংশটি বাদ দিন অথবা এভাবে রাখুন
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false # এটি false রাখুন যাতে পোর্ট রেসপন্স না পেলেও বট বন্ধ না হয়
  auto_start_machines = true
  min_machines_running = 1
